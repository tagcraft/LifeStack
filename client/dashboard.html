<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeStack | Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="dashboard-page">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo-dot"></div>
          <div>
            <h1>LifeStack</h1>
            <p>Productivity Dashboard</p>
          </div>
        </div>

        <nav class="nav">
          <button class="nav-button active" data-section="todos">To-Do</button>
          <button class="nav-button" data-section="habits">Habits</button>
          <button class="nav-button" data-section="money">Money</button>
          <button class="nav-button" data-section="planner">Planner</button>
          <button id="logout-button" class="nav-button danger">Logout</button>
        </nav>
      </aside>

      <main class="main-content">
        <section id="section-todos" class="content-section active">
          <div class="section-header">
            <h2>To-Do</h2>
            <p>Plan your day and track progress.</p>
          </div>
          <div class="card">
            <form id="todo-form" class="inline-form">
              <input type="text" name="title" placeholder="Add a new task" required />
              <button type="submit" class="primary-button">Add</button>
            </form>
            <div id="todo-list" class="list"></div>
          </div>
        </section>

        <section id="section-habits" class="content-section">
          <div class="section-header">
            <h2>Habits</h2>
            <p>Keep streaks alive with daily wins.</p>
          </div>
          <div class="card">
            <form id="habit-form" class="inline-form">
              <input type="text" name="name" placeholder="Habit name" required />
              <input type="text" name="description" placeholder="Description (optional)" />
              <button type="submit" class="primary-button">Add</button>
            </form>
            <div id="habit-list" class="list"></div>
          </div>
        </section>

        <section id="section-money" class="content-section">
          <div class="section-header">
            <h2>Money</h2>
            <p>Track spending and see monthly totals.</p>
          </div>
          <div class="card">
            <form id="expense-form" class="inline-form">
              <input type="text" name="title" placeholder="Expense title" required />
              <input type="number" name="amount" placeholder="Amount" step="0.01" required />
              <input type="text" name="category" placeholder="Category" required />
              <button type="submit" class="primary-button">Add</button>
            </form>
            <div class="summary-row">
              <span>Monthly Total</span>
              <strong id="monthly-total">$0.00</strong>
            </div>
            <div id="expense-list" class="list"></div>
          </div>
        </section>

        <section id="section-planner" class="content-section">
          <div class="section-header">
            <h2>Planner</h2>
            <p>Keep upcoming events in view.</p>
          </div>
          <div class="card">
            <form id="event-form" class="inline-form">
              <input type="text" name="title" placeholder="Event title" required />
              <input type="date" name="date" required />
              <button type="submit" class="primary-button">Add</button>
            </form>
            <div id="event-list" class="list"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="js/dashboard.js"></script>
  </body>
</html>
